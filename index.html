<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StadiumMate - World Cup 2026 Assistant</title>
    <meta name="description" content="StadiumMate is a multilingual AI chat assistant for fans at FIFA World Cup 2026 stadiums.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-image"></div>
    <div class="app-container">
        <header>
            <div class="header-content">
                <img src="logo.png" alt="StadiumMate Logo" class="fifa-logo">
                <h1>STADIUMMATE</h1>
            </div>
        </header>

        <main class="chat-container" id="chatContainer">
            <div class="message system-message">
                <div class="bubble">
                    Hello! I'm StadiumMate, your World Cup 2026 assistant. How can I help you today?
                </div>
            </div>
        </main>

        <footer class="input-container">
            <form id="chatForm">
                <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" required>
                <button type="submit" id="sendBtn" aria-label="Send Message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
